<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script src="js/loader.js"></script>
    
    <style>
        body {
            background-color: #0b111a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .main-404-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 150px);
            text-align: center;
            padding: 8rem 0 4rem;
            margin-top: 80px;
        }
        
        .error-container {
            max-width: 650px;
            padding: 2rem;
            overflow: visible;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @keyframes slide-x {
            0%, 100% { transform: translateX(-25px); }
            50% { transform: translateX(25px); }
        }

        .error-code {
            font-size: 13rem;
            font-weight: 800;
            color: #3bb2ff;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 25px rgba(59, 178, 255, 0.4), 0 0 60px rgba(59, 178, 255, 0.2);
            letter-spacing: -5px;
            animation: jump 2.5s ease-in-out infinite;
            display: inline-block;
        }

        .error-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            animation: slide-x 4s ease-in-out infinite;
            display: inline-block;
        }

        .error-description {
            font-size: 1.15rem;
            color: #c2c9d1;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .btn-group-custom {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-custom {
            padding: 0.8rem 1.8rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .btn-custom i {
            font-size: 0.9rem;
        }
        
        .btn-custom .fa-arrow-left {
            margin-right: 0.6rem;
        }
        
        .btn-custom .fa-arrow-right {
            margin-left: 0.6rem;
        }

        .btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #475266;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #22d3ee 0%, #08d1a1 100%);
            color: #ffffff;
            border: none;
        }

        .btn-primary-gradient:hover {
            opacity: 0.9;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-404-container">
        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-title">Page Not Found</div>
            <p class="error-description">
                Oops! The page you are looking for doesn't exist, has been<br>
                moved, or is temporarily unavailable.
            </p>
            <div class="btn-group-custom">
                <a href="javascript:history.back()" class="btn-custom btn-outline">
                    <i class="fa-solid fa-arrow-left"></i> GO BACK
                </a>
                <a href="index.html" class="btn-custom btn-primary-gradient">
                    GO TO DASHBOARD <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
