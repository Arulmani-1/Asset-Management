<!DOCTYPE html>
<html lang="en" class="lenis lenis-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | STACKLY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">

    <script src="js/loader.js"></script>
</head>
<body>
    <div class="login-overlay"></div>
    
    <div class="login-wrapper min-vh-100 d-flex flex-column align-items-center justify-content-center p-3">
        <div class="container z-1">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-9 col-12" style="max-width: 450px;">
                    <div class="login-card w-100">
                        <div class="text-center mb-4">
                            <img src="assets/images/logo.webp" alt="Stackly" class="mb-4" style="height: 55px; object-fit: contain;">
                            <h4 class="fw-bold text-white mb-2" style="font-size: 1.4rem;">Create Account</h4>
                            <p class="text-white-50 small mb-0">Join us to track your project progress</p>
                        </div>
                        
                        <form id="signupForm">
                            <!-- Select Role -->
                            <div class="login-input-group">
                                <select class="form-control login-input text-white-50">
                                    <option>Select Role</option>
                                    <option>Admin</option>
                                    <option>User</option>
                                </select>
                                <i class="fa-solid fa-chevron-down login-input-icon"></i>
                            </div>

                            <!-- Full Name -->
                            <div class="login-input-group">
                                <input type="text" id="signupName" class="form-control login-input" placeholder="Full Name" required>
                                <i class="fa-regular fa-user login-input-icon"></i>
                            </div>

                            <!-- Email -->
                            <div class="login-input-group">
                                <input type="email" id="signupEmail" class="form-control login-input" placeholder="Email Address" required>
                                <i class="fa-regular fa-envelope login-input-icon"></i>
                            </div>
                            
                            <!-- Password -->
                            <div class="login-input-group">
                                <input type="password" class="form-control login-input" placeholder="Password" required>
                                <i class="fa-regular fa-eye-slash login-input-icon"></i>
                            </div>

                            <!-- Confirm Password -->
                            <div class="login-input-group mb-4">
                                <input type="password" class="form-control login-input" placeholder="Confirm Password" required>
                                <i class="fa-regular fa-eye-slash login-input-icon"></i>
                            </div>
                            
                            <button class="btn-gold w-100 py-3 mb-4" type="submit">Sign Up</button>
                            
                            <div class="text-center mb-3">
                                <p class="text-white-50 small mb-0">Already have an account? <a href="login.html" class="text-gold text-decoration-none fw-semibold">Sign In</a></p>
                            </div>
                            
                            <div class="text-center mt-4">
                                <a href="index.html" class="btn-home"><i class="fa-solid fa-house me-2" style="font-size: 0.8rem;"></i> Go to Home</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/main.js"></script>
    <script src="js/cursor.js"></script>
    <script src="js/three.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            if (signupForm) {
                signupForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('signupName').value;
                    const email = document.getElementById('signupEmail').value;
                    
                    if (name && email) {
                        let users = JSON.parse(localStorage.getItem('usersData')) || {};
                        users[email] = name;
                        localStorage.setItem('usersData', JSON.stringify(users));
                    }
                    
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>
</html>
