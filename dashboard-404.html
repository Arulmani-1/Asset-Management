<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #6493d9 0%, #a7977b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-container {
            padding: 2rem;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @keyframes slide-x {
            0%, 100% { transform: translateX(-25px); }
            50% { transform: translateX(25px); }
        }

        .error-code {
            font-size: 14rem;
            font-weight: 800;
            color: #3bb2ff;
            text-shadow: 0 0 40px rgba(59, 178, 255, 0.4);
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -5px;
            animation: jump 2.5s ease-in-out infinite;
            display: block;
        }
        .error-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            animation: slide-x 4s ease-in-out infinite;
            display: block;
        }
        .error-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            max-width: 550px;
            margin: 0 auto 3rem auto;
            line-height: 1.6;
        }
        .btn-go-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 1px;
            margin-right: 10px;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-go-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        .btn-dashboard {
            background: #1ae5c2;
            border: none;
            color: #ffffff;
            padding: 13px 25px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-dashboard:hover {
            background: #14cdac;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
                letter-spacing: -2px;
            }
            .error-title {
                font-size: 2rem;
            }
            .error-desc {
                font-size: 1rem;
                padding: 0 1rem;
            }
            .btn-go-back {
                margin-right: 0;
                display: block;
                width: 100%;
                margin-bottom: 15px;
            }
            .btn-dashboard {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <div class="error-desc">Oops! The page you are looking for doesn't exist, has been moved, or is temporarily unavailable.</div>
        <div>
            <a href="javascript:history.back()" class="btn-go-back">&larr; GO BACK</a>
            <a href="user-dashboard.html" class="btn-dashboard">GO TO DASHBOARD &rarr;</a>
        </div>
    </div>
</body>
</html>
